steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Prisma Generate
        run: npx prisma generate

      - name: Build TypeScript
        run: npm run build

      # Server ဖွင့်စရာမလိုတော့ဘဲ တန်းပြီး Test လို့ရပါပြီ
      - name: Run Tests
        run: npm test